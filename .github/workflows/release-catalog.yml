name: Release catalog

on:
  push:
    tags:
      - 'catalog-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate
        run: python scripts/validate_catalog.py

      - name: Build lock and release bundle
        run: |
          python scripts/build_lock.py
          python scripts/create-release-bundle.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/biosup-catalog-release.zip
            dist/SHA256SUMS.txt
