name: Validate catalog

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate catalog safety rules
        run: python scripts/validate_catalog.py

      - name: Verify catalog lock
        run: |
          python scripts/build_lock.py
          git diff --exit-code catalog.lock.json
