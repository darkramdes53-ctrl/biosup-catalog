name: Release catalog

on:
  push:
    tags:
      - 'catalog-v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate
        run: |
          python scripts/format_json.py
          python scripts/build_lock.py
          python scripts/validate_catalog.py

      - name: Pack vendors
        run: |
          zip -r vendors.zip vendors schemas docs catalog.json catalog.lock.json README.md CHANGELOG.md SECURITY.md CONTRIBUTING.md LICENSE_NOTICE.txt
          sha256sum catalog.json catalog.lock.json vendors.zip > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            catalog.json
            catalog.lock.json
            vendors.zip
            SHA256SUMS.txt
